<div class="bg-white rounded-lg shadow-2xl p-6 mt-6">
  <div class="flex justify-between gap-4 mb-4">
    <app-table-search (searchChange)="onSearch($event)"></app-table-search>
    <app-table-filters
      [filtersConfig]="filtersConfig"
      (apply)="onApplyFilters($event)"
      (reset)="resetFilters()"
    ></app-table-filters>
  </div>

  <div class="overflow-x-auto w-full">
    <table mat-table [dataSource]="dataSource" matSort>
      @for (column of columns; track column) {
        <ng-container [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="font-bold">
            {{ column | titlecase }}
          </th>

          <td mat-cell *matCellDef="let row">
            @if (column === 'actions') {
              <button mat-button color="warn" (click)="deleteCustomer(row.id)">Delete</button>
            } @else {
              {{ row[column] }}
            }
          </td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  </div>

  <!-- Paginator -->
  <div class="flex justify-between items-center">
    <div class="text-sm text-gray-600">
      Showing {{ dataSource.filteredData.length }} of {{ dataSource.data.length }} entries
    </div>
    <mat-paginator class="mt-4" [pageSize]="5" [pageSizeOptions]="[5, 10, 20]"></mat-paginator>
  </div>
</div>
