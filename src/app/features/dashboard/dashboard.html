<!-- App : Key Performance Indicators -->
<app-key-performance-indicator />

<!-- Charts -->
<div class="flex flex-col gap-6 mt-6 overflow-x-hidden">
  <div class="bg-white rounded-xl shadow p-4">
    <h3 class="text-lg font-semibold mb-3">Spend Trend</h3>
    <app-line-chart [data]="spendTrendByDate()" (dateClick)="onDateFilter($event)"> </app-line-chart>
  </div>

<div class="flex gap-6 items-stretch">
  <div class="bg-white rounded-xl shadow p-4 flex-1 min-w-0">
    <h3 class="text-lg font-semibold mb-3">Spend by Status</h3>
    <app-pie-chart
      [data]="spendByStatus()"
      (statusClick)="onStatusFilter($event)">
    </app-pie-chart>
  </div>

  <div class="bg-white rounded-xl shadow p-4 flex-1 min-w-0">
    <h3 class="text-lg font-semibold mb-3">Spend by Category</h3>
    <app-bar-chart [data]="spendByCategory()" (categoryClick)="onCategoryFilter($event)"></app-bar-chart>
  </div>
</div>
</div>

<app-data-table
  [columns]="displayedColumns"
  [data]="customers"
  [filtersConfig]="filtersConfig"
  [enablePagination]="enablePagination()"
  [enableSorting]="enableSorting()"
  [enableSearch]="enableSearch()"
  [enableFilters]="enableFilters()"
  [chartFilter]="chartFilter()"
  (addNewCustomerEvent)="openCustomerModal()"
>
</app-data-table>
